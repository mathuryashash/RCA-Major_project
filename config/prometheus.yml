global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: 'rca-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 60s

  - job_name: 'metric-exporter'
    static_configs:
      - targets: ['metric-exporter:9091']
    metrics_path: '/metrics'
    scrape_interval: 60s
